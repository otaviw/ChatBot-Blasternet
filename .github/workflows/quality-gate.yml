name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  BACKEND_COVERAGE_MIN: ${{ vars.BACKEND_COVERAGE_MIN }}
  FRONTEND_COVERAGE_MIN: ${{ vars.FRONTEND_COVERAGE_MIN }}
  REALTIME_COVERAGE_MIN: ${{ vars.REALTIME_COVERAGE_MIN }}

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: chatbot_test
          POSTGRES_USER: chatbot
          POSTGRES_PASSWORD: chatbot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chatbot -d chatbot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: chatbot_test
      DB_USERNAME: chatbot
      DB_PASSWORD: chatbot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo, pdo_pgsql, pgsql, gd
          coverage: pcov

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Copy .env
        working-directory: backend
        run: cp .env.example .env

      - name: Enforce safe production debug configuration
        shell: bash
        run: |
          normalize() {
            echo "$1" | tr '[:upper:]' '[:lower:]' | tr -d '"'"'"'\''[:space:]'
          }

          file_env="$(grep -E '^APP_ENV=' backend/.env | tail -n1 | cut -d= -f2-)"
          file_debug="$(grep -E '^APP_DEBUG=' backend/.env | tail -n1 | cut -d= -f2-)"

          app_env="$(normalize "${APP_ENV:-$file_env}")"
          app_debug="$(normalize "${APP_DEBUG:-$file_debug}")"

          if [[ "$app_env" == "production" && "$app_debug" == "true" ]]; then
            echo "Unsafe configuration: APP_DEBUG=true with APP_ENV=production."
            exit 1
          fi

      - name: Generate app key
        working-directory: backend
        run: php artisan key:generate

      - name: Run migrations
        working-directory: backend
        run: php artisan migrate --force

      - name: Run backend lint
        working-directory: backend
        run: find app bootstrap config database routes tests -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Run backend tests with coverage threshold
        working-directory: backend
        env:
          APP_ENV: testing
        run: php vendor/bin/pest --coverage --min="${BACKEND_COVERAGE_MIN:-60}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            realtime/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests with coverage threshold
        working-directory: frontend
        run: FRONTEND_COVERAGE_MIN="${FRONTEND_COVERAGE_MIN:-60}" npm run test:coverage

      - name: Install realtime dependencies
        working-directory: realtime
        run: npm ci

      - name: Run realtime lint
        working-directory: realtime
        run: npm run lint

      - name: Run realtime tests with coverage threshold
        working-directory: realtime
        run: |
          REALTIME_COVERAGE_MIN="${REALTIME_COVERAGE_MIN:-60}"
          npx c8 --check-coverage --lines "$REALTIME_COVERAGE_MIN" --functions "$REALTIME_COVERAGE_MIN" --branches "$REALTIME_COVERAGE_MIN" --reporter text-summary node --test
