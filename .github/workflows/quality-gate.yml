name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_sqlite, sqlite3

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run backend test suite
        run: php artisan test --stop-on-failure

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend quality check
        run: npm run check

  realtime:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: realtime
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: realtime/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run realtime quality check
        run: npm run check
