name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  BACKEND_COVERAGE_MIN: ${{ vars.BACKEND_COVERAGE_MIN }}
  FRONTEND_COVERAGE_MIN: ${{ vars.FRONTEND_COVERAGE_MIN }}
  REALTIME_COVERAGE_MIN: ${{ vars.REALTIME_COVERAGE_MIN }}

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, gd
          coverage: pcov

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Copy .env
        working-directory: backend
        run: cp .env.example .env

      - name: Generate app key
        working-directory: backend
        run: php artisan key:generate

      - name: Create sqlite database
        working-directory: backend
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Run migrations
        working-directory: backend
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force

      - name: Run backend lint
        working-directory: backend
        run: find app bootstrap config database routes tests -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Run backend tests with coverage threshold
        working-directory: backend
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php vendor/bin/pest --coverage --min="${BACKEND_COVERAGE_MIN:-60}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            realtime/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests with coverage threshold
        working-directory: frontend
        run: FRONTEND_COVERAGE_MIN="${FRONTEND_COVERAGE_MIN:-60}" npm run test:coverage

      - name: Install realtime dependencies
        working-directory: realtime
        run: npm ci

      - name: Run realtime lint
        working-directory: realtime
        run: npm run lint

      - name: Run realtime tests with coverage threshold
        working-directory: realtime
        run: |
          REALTIME_COVERAGE_MIN="${REALTIME_COVERAGE_MIN:-60}"
          npx c8 --check-coverage --lines "$REALTIME_COVERAGE_MIN" --functions "$REALTIME_COVERAGE_MIN" --branches "$REALTIME_COVERAGE_MIN" --reporter text-summary node --test
