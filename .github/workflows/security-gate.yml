name: Security Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: security-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep

      - name: Run Semgrep (block high-risk findings)
        run: |
          semgrep scan \
            --config "p/php" \
            --config "p/javascript" \
            --severity ERROR \
            --error \
            --metrics=off \
            --output semgrep.sarif \
            --sarif

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  dependency-scan:
    name: Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy dependency scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scanners: vuln
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: sarif
          output: trivy-deps.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-deps.sarif
          category: trivy-dependency

  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs:
      - sast
      - dependency-scan
      - secret-scan
    steps:
      - name: All security checks passed
        run: echo "Security gate passed."
